<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMAGE Intro Animation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .intro-container {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1200px;
            /* Perspective for 3D depth */
            background-color: #fff;
        }

        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            transform-style: preserve-3d;
        }

        /* The gallery images that fly by */
        .fly-img {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 250px;
            height: 350px;
            margin-left: -125px;
            margin-top: -175px;
            object-fit: cover;
            border-radius: 12px;
            will-change: transform, opacity;
            pointer-events: none;
            opacity: 0;
        }

        /* The final hero image that becomes the background */
        .final-img {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
            will-change: transform, width, height, border-radius, opacity;
            opacity: 0;
            margin: 0;
        }

        /* Overlay text */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #000;
            z-index: 10;
            pointer-events: none;
            opacity: 1;
            width: 100%;
        }

        .content h1 {
            font-size: 6rem;
            letter-spacing: 0.2em;
            margin: 0;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.7);
            font-weight: 200;
        }

        .content p {
            font-size: 1.2rem;
            letter-spacing: 0.6em;
            margin-top: 15px;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .content h1 {
                font-size: 3rem;
            }

            .content p {
                font-size: 0.9rem;
            }

            .fly-img {
                width: 150px;
                height: 210px;
                margin-left: -75px;
                margin-top: -105px;
            }

            .final-img {
                width: 300px;
                height: 180px;
                margin-left: -150px;
                margin-top: -90px;
            }
        }
    </style>
</head>

<body>

    <div class="intro-container">
        <div class="scene">
            <!-- 飞出的图片 1~7 -->
            <img class="fly-img" src="img/1.jpg" alt="Gallery Image 1" />
            <img class="fly-img" src="img/2.jpg" alt="Gallery Image 2" />
            <img class="fly-img" src="img/3.jpg" alt="Gallery Image 3" />
            <img class="fly-img" src="img/4.jpg" alt="Gallery Image 4" />
            <img class="fly-img" src="img/5.jpg" alt="Gallery Image 5" />
            <img class="fly-img" src="img/6.jpg" alt="Gallery Image 6" />
            <img class="fly-img" src="img/7.jpg" alt="Gallery Image 7" />

            <!-- 最终固定的背景图 8 -->
            <img class="final-img" src="img/8.jpg" alt="Final Background" />
        </div>

        <div class="content">
            <h1>XMAGE</h1>
            <p>EXPLORE THE WORLD</p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const flyImgs = gsap.utils.toArray('.fly-img');
            const finalImg = document.querySelector('.final-img');

            const tl = gsap.timeline(); // 去掉 delay，确保一刷新就动
            let w = window.innerWidth;
            let h = window.innerHeight;

            // --- 自定义配置区域 ---
            // x, y 现在是相对于视口宽高的比例 (0.5 为一半，负数向左/上)
            // z 依然是纵深位置 (负数越深)
            const config = [
                { x: -0.25, y: -0.2, z: -600 }, // 1.jpg
                { x: -0.20, y: -0.1, z: -2500 }, // 2.jpg
                { x: 0.25, y: 0.0, z: -2000 }, // 3.jpg
                { x: 0.3, y: -0.25, z: -600 }, // 4.jpg
                { x: -0.25, y: 0.10, z: -2000 }, // 5.jpg
                { x: 0.20, y: 0.0, z: -4500 }, // 6.jpg
                { x: -0.1, y: 0.10, z: -4500 }, // 7.jpg
                { x: 0.05, y: 0.0, z: -11000 } // 8.jpg (对应你刚才调的 y: 1400)
            ];

            // 动画参数自定义
            const pushDuration = 3;
            const pushEase = "expo.inOut"; // 缓动参考: "none", "power1.out", "power2.out"(推荐), "power3.out", "power4.out", "expo.out"(高级感), "sine.out", "circ.out", "back.out(1.7)"(碰撞感)

            // 全局中心点
            const sceneCenterX = "50%";
            const sceneCenterY = "100%";

            // 图片宽度也改为响应式 (例如占用视口宽度的 25%)
            const imageWidth = w * 0.25;
            const imageHeight = imageWidth * 0.625; // 16:10 比例

            // 1. 初始化小图位置
            flyImgs.forEach((img, i) => {
                const item = config[i];
                img.setAttribute('data-z', item.z);

                gsap.set(img, {
                    width: imageWidth,
                    height: imageHeight,
                    left: sceneCenterX,
                    top: sceneCenterY,
                    xPercent: -50,
                    yPercent: -50,
                    x: item.x * w, // 响应式乘以视口宽
                    y: item.y * h, // 响应式乘以视口高
                    z: item.z,
                    opacity: 1
                });
            });

            // 2. 初始化最终背景图 (8.jpg)
            const lastItem = config[7];
            const finalImgZ = lastItem.z;

            gsap.set(finalImg, {
                width: "100%",
                height: "100%",
                left: sceneCenterX,
                top: sceneCenterY,
                xPercent: -50,
                yPercent: -50,
                x: lastItem.x * w,
                y: lastItem.y * h,
                z: finalImgZ,
                opacity: 1,
                borderRadius: 0,
                margin: 0
            });

            // 3. 镜头推进动画 & 背景图同步回正
            tl.to(".scene", {
                z: Math.abs(finalImgZ),
                duration: pushDuration,
                ease: pushEase
            }, 0);

            tl.to(finalImg, {
                left: 0,
                top: 0,
                xPercent: 0,
                yPercent: 0,
                x: 0,
                y: 0,
                duration: pushDuration,
                ease: pushEase
            }, 0);
        });
    </script>

</body>

</html>
